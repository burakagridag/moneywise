name: moneywise
description: "MoneyWise — personal finance tracker for iOS and Android."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Local database
  drift: ^2.18.0
  sqlcipher_flutter_libs: ^0.5.4
  path_provider: ^2.1.3
  path: ^1.9.0

  # Security
  flutter_secure_storage: ^9.2.2

  # Code generation models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Internationalization
  intl: ^0.20.2

  # Currency
  money2: ^6.3.0

  # Charts
  fl_chart: ^0.68.0

  # HTTP
  dio: ^5.4.3+1

  # ID generation
  uuid: ^4.4.0

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # Testing
  mocktail: ^1.0.3
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:
  generate: true
  uses-material-design: true
