<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPIC8D-01 — Transactions Liste (Dark)</title>
<style>
  :root {
    --bg: #0F1117;
    --surface: #181C27;
    --border: #2E3453;
    --shadow: 0 2px 8px rgba(0,0,0,0.20);
    --text-primary: #F0F2F8;
    --text-secondary: #8A90A8;
    --text-tertiary: #5C5E6B;
    --brand: #4F46E5;
    --brand-variant: #3D5A99;
    --income: #34D399;
    --expense: #E55A4E;
    --highlight: #1F2540;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: #1A1C24;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    min-height: 100vh;
  }

  .phone {
    width: 430px;
    min-height: 932px;
    background: var(--bg);
    border-radius: 48px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    height: 44px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 32px;
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .status-bar .right {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 14px;
  }

  .header {
    padding: 16px 20px 12px;
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .header-actions {
    display: flex;
    gap: 4px;
  }

  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: transparent;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-primary);
  }

  .icon-btn svg {
    width: 22px;
    height: 22px;
    stroke-width: 2;
  }

  .header-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.5px;
  }

  .month-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    padding: 4px 0 16px;
  }

  .month-nav-arrow {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .month-nav-arrow svg {
    width: 20px;
    height: 20px;
  }

  .month-nav-label {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .tab-bar {
    display: flex;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }

  .tab {
    flex: 1;
    padding: 14px 0;
    text-align: center;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    margin-bottom: -1px;
  }

  .tab.active {
    color: var(--brand);
    border-bottom-color: var(--brand);
    font-weight: 600;
  }

  .summary-strip {
    display: flex;
    background: var(--bg);
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }

  .summary-cell {
    flex: 1;
    text-align: center;
  }

  .summary-cell-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .summary-cell-value {
    font-size: 17px;
    font-weight: 700;
  }

  .summary-cell.income .summary-cell-value {
    color: var(--income);
  }

  .summary-cell.expense .summary-cell-value {
    color: var(--expense);
  }

  .summary-cell.net .summary-cell-value {
    color: var(--text-primary);
  }

  .content {
    flex: 1;
    padding: 16px 20px 100px;
    overflow-y: auto;
  }

  .day-group {
    margin-bottom: 16px;
  }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 4px 8px;
  }

  .day-header-left {
    display: flex;
    gap: 8px;
    align-items: baseline;
  }

  .day-number {
    font-size: 22px;
    font-weight: 700;
    color: var(--brand);
  }

  .day-name {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .day-total {
    font-size: 15px;
    font-weight: 600;
    color: var(--income);
  }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .txn-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
  }

  .txn-row + .txn-row {
    border-top: 1px solid var(--border);
  }

  .txn-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .txn-icon.income-bg {
    background: rgba(52, 211, 153, 0.15);
  }

  .txn-icon.expense-bg {
    background: rgba(229, 90, 78, 0.15);
  }

  .txn-info {
    flex: 1;
    min-width: 0;
  }

  .txn-category {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .txn-account {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .txn-amount {
    font-size: 16px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .txn-amount.income {
    color: var(--income);
  }

  .txn-amount.expense {
    color: var(--expense);
  }

  .fab {
    position: absolute;
    right: 20px;
    bottom: 110px;
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: var(--brand);
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(79, 70, 229, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .fab svg {
    width: 24px;
    height: 24px;
    stroke-width: 2.5;
  }

  .bottom-nav {
    display: flex;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 12px 20px 32px;
    gap: 4px;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 0;
    color: var(--text-secondary);
    cursor: pointer;
  }

  .nav-item.active {
    color: var(--brand);
  }

  .nav-item-icon {
    width: 56px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
  }

  .nav-item.active .nav-item-icon {
    background: var(--highlight);
  }

  .nav-item-icon svg {
    width: 22px;
    height: 22px;
    stroke-width: 2;
  }

  .nav-item-label {
    font-size: 11px;
    font-weight: 600;
  }

  .frame-label {
    text-align: center;
    margin-bottom: 16px;
    font-size: 14px;
    font-weight: 600;
    color: #C8C4BC;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .frame-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
</style>
</head>
<body>

<div class="frame-wrapper">
  <div class="frame-label">Liste — Dark Mode</div>

  <div class="phone">
    <div class="status-bar">
      <span>14:18</span>
      <div class="right">
        <span style="font-size: 12px;">●●●●</span>
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 0C5.5 0 3.2 0.9 1.4 2.4l1.4 1.7C4.2 3 6 2.3 8 2.3s3.8 0.7 5.2 1.8l1.4-1.7C12.8 0.9 10.5 0 8 0zm0 4.6c-1.5 0-2.9 0.5-4 1.5l1.4 1.7c0.7-0.6 1.6-1 2.6-1s1.9 0.4 2.6 1l1.4-1.7c-1.1-1-2.5-1.5-4-1.5zm0 4.6c-0.5 0-1 0.2-1.4 0.5L8 11l1.4-1.4c-0.4-0.3-0.9-0.4-1.4-0.4z"/></svg>
        <svg width="24" height="11" viewBox="0 0 24 11" fill="currentColor"><rect x="0" y="0" width="22" height="11" rx="3" ry="3" fill="none" stroke="currentColor" stroke-opacity="0.4"/><rect x="2" y="2" width="18" height="7" rx="1" ry="1"/></svg>
      </div>
    </div>

    <div class="header">
      <div class="header-row">
        <button class="icon-btn" aria-label="Search">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
        </button>
        <div class="header-title">İşlemler</div>
        <div class="header-actions">
          <button class="icon-btn" aria-label="Bookmarks">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
          </button>
          <button class="icon-btn" aria-label="Filter">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div class="month-nav">
        <button class="month-nav-arrow" aria-label="Previous">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="month-nav-label">Mayıs 2026</span>
        <button class="month-nav-arrow" aria-label="Next">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab active">Liste</div>
      <div class="tab">Takvim</div>
      <div class="tab">Özet</div>
    </div>

    <div class="summary-strip">
      <div class="summary-cell income">
        <div class="summary-cell-label">Gelir</div>
        <div class="summary-cell-value">+1.000 €</div>
      </div>
      <div class="summary-cell expense">
        <div class="summary-cell-label">Gider</div>
        <div class="summary-cell-value">−10 €</div>
      </div>
      <div class="summary-cell net">
        <div class="summary-cell-label">Net</div>
        <div class="summary-cell-value">+990 €</div>
      </div>
    </div>

    <div class="content">
      <div class="day-group">
        <div class="day-header">
          <div class="day-header-left">
            <span class="day-number">8</span>
            <span class="day-name">Cuma</span>
          </div>
          <span class="day-total">+990,00 €</span>
        </div>

        <div class="day-card">
          <div class="txn-row">
            <div class="txn-icon income-bg">💰</div>
            <div class="txn-info">
              <div class="txn-category">Maaş</div>
              <div class="txn-account">Dkb</div>
            </div>
            <div class="txn-amount income">+1.000,00 €</div>
          </div>

          <div class="txn-row">
            <div class="txn-icon expense-bg">🍜</div>
            <div class="txn-info">
              <div class="txn-category">Yemek</div>
              <div class="txn-account">Dkb</div>
            </div>
            <div class="txn-amount expense">−10,00 €</div>
          </div>
        </div>
      </div>

      <div class="day-group">
        <div class="day-header">
          <div class="day-header-left">
            <span class="day-number">7</span>
            <span class="day-name">Perşembe</span>
          </div>
          <span class="day-total" style="color: var(--expense);">−45,50 €</span>
        </div>

        <div class="day-card">
          <div class="txn-row">
            <div class="txn-icon expense-bg">🚌</div>
            <div class="txn-info">
              <div class="txn-category">Ulaşım</div>
              <div class="txn-account">Dkb</div>
            </div>
            <div class="txn-amount expense">−15,50 €</div>
          </div>

          <div class="txn-row">
            <div class="txn-icon expense-bg">🛒</div>
            <div class="txn-info">
              <div class="txn-category">Market</div>
              <div class="txn-account">Dkb</div>
            </div>
            <div class="txn-amount expense">−30,00 €</div>
          </div>
        </div>
      </div>

      <div class="day-group">
        <div class="day-header">
          <div class="day-header-left">
            <span class="day-number">5</span>
            <span class="day-name">Salı</span>
          </div>
          <span class="day-total" style="color: var(--expense);">−12,00 €</span>
        </div>

        <div class="day-card">
          <div class="txn-row">
            <div class="txn-icon expense-bg">☕</div>
            <div class="txn-info">
              <div class="txn-category">Kafe</div>
              <div class="txn-account">Dkb</div>
            </div>
            <div class="txn-amount expense">−12,00 €</div>
          </div>
        </div>
      </div>
    </div>

    <button class="fab" aria-label="Yeni işlem ekle">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <div class="bottom-nav">
      <div class="nav-item">
        <div class="nav-item-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
        </div>
        <span class="nav-item-label">Home</span>
      </div>
      <div class="nav-item active">
        <div class="nav-item-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 2v18M15 2v18M3 6h18M3 18h18"/></svg>
        </div>
        <span class="nav-item-label">Transactions</span>
      </div>
      <div class="nav-item">
        <div class="nav-item-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        </div>
        <span class="nav-item-label">Budget</span>
      </div>
      <div class="nav-item">
        <div class="nav-item-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </div>
        <span class="nav-item-label">More</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
