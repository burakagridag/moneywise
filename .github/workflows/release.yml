name: Release

# Triggered only on version tags (e.g., v1.0.0, v0.8c.1).
# Requires Product Sponsor approval before tagging — never push a tag without approval.
on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.x'

jobs:
  # ---------------------------------------------------------------------------
  # iOS — Build signed IPA and upload to TestFlight
  # ---------------------------------------------------------------------------
  release_ios:
    name: iOS — TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install --repo-update

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Setup App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Setup fastlane match (certificates + provisioning)
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          fastlane match appstore --readonly

      - name: Extract build number from tag
        id: build_number
        run: |
          # Tags like v1.0.0+2 carry the build number after '+'.
          # Fall back to the GitHub run number if no '+' is present.
          TAG="${{ github.ref_name }}"
          BUILD=$(echo "$TAG" | grep -oP '(?<=\+)\d+' || echo "${{ github.run_number }}")
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Build IPA (prod flavor)
        run: |
          flutter build ipa \
            --flavor prod \
            -t lib/main_prod.dart \
            --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcrun altool \
            --upload-app \
            -f build/ios/ipa/*.ipa \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: moneywise-ios-prod-${{ github.ref_name }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Android — Build signed AAB and upload to Play Internal Testing
  # ---------------------------------------------------------------------------
  release_android:
    name: Android — Play Internal Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Build App Bundle (prod flavor)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build appbundle \
            --flavor prod \
            -t lib/main_prod.dart \
            --release

      - name: Upload AAB to Play Internal Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: com.moneywise.app
          releaseFiles: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          track: internal
          status: completed

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: moneywise-android-prod-${{ github.ref_name }}
          path: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/keystore.jks

  # ---------------------------------------------------------------------------
  # Post-release — tag GitHub Release with changelog excerpt
  # ---------------------------------------------------------------------------
  github_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release_ios, release_android]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          # Strip leading 'v' and any '+BUILD' suffix to match changelog headers
          VERSION=$(echo "$TAG" | sed 's/^v//' | sed 's/+.*//')
          # Extract the block between this version header and the next '## ['
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Write to file to handle multi-line content safely
          echo "$NOTES" > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MoneyWise ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
