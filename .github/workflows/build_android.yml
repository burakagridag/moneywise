name: Build Android

on:
  push:
    branches:
      - develop
      - main

env:
  FLUTTER_VERSION: '3.22.x'

jobs:
  build_android_dev:
    name: Build Android APK (dev flavor)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (dev flavor, debug)
        run: flutter build apk --flavor dev -t lib/main_dev.dart --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moneywise-dev-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-dev-debug.apk
          retention-days: 7
